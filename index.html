<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProMed · Sistema de Gestión de Atenciones Corporativas (Prototipo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- SheetJS para leer/generar Excel en el navegador. Si no hay conexión, el sistema usa CSV como respaldo automáticamente. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#11357C; --navy2:#1D4AA3; --ink:#0B2557;
  --orange:#F26B2B; --orange2:#FF8A4D; --orange-soft:#FFF1E8;
  --gold:#C9A227; --gold2:#EBD27E;
  --bg:#F3F6FB; --card:#FFFFFF; --line:#E4EAF4;
  --text:#1E2B45; --muted:#6B7A93;
  --green:#1E9E5A; --green-soft:#E7F6EE;
  --amber:#C77700; --amber-soft:#FFF4E0;
  --red:#D43B3B; --red-soft:#FDEBEB;
  --blue-soft:#EAF1FE; --purple:#6D4FC4; --purple-soft:#F0EBFB;
  --r:14px; --sh:0 6px 24px rgba(17,53,124,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',system-ui,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--text)}
::placeholder{color:#A6B2C5}

/* ── Topbar ─────────────────────────────── */
.topbar{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:10px 22px;box-shadow:0 2px 12px rgba(17,53,124,.05)}
.topbar::after{content:"";position:absolute;left:0;right:0;bottom:-3px;height:3px;background:linear-gradient(90deg,var(--navy) 0 40%,var(--orange) 40% 72%,var(--gold2) 72% 100%);opacity:.9}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand .cross{flex:0 0 auto}
.wordmark{font-family:Georgia,'Times New Roman',serif;font-size:24px;font-weight:700;letter-spacing:.5px;line-height:1}
.wordmark .pro{color:var(--navy)} .wordmark .med{color:var(--orange)}
.tagline{font-size:10.5px;color:var(--navy);opacity:.75;margin-top:2px;letter-spacing:.2px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.datebox{font-size:12px;color:var(--muted);text-transform:capitalize}
.live{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FFF8E3,#FBEFC8);color:#8A6D12;border:1px solid #EBD9A0;font-weight:600;font-size:11px;padding:5px 11px;border-radius:99px}
.live .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(30,158,90,.5)}70%{box-shadow:0 0 0 7px rgba(30,158,90,0)}100%{box-shadow:0 0 0 0 rgba(30,158,90,0)}}
.userchip{display:flex;align-items:center;gap:9px;background:var(--blue-soft);border:1px solid #D5E2F8;border-radius:99px;padding:5px 13px 5px 6px}
.userchip .avatar{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.userchip .uname{font-size:12px;font-weight:600;color:var(--ink);line-height:1.15}
.userchip .urole{font-size:10.5px;color:var(--muted)}

/* ── Layout ─────────────────────────────── */
.shell{display:flex;min-height:calc(100vh - 64px)}
.sidebar{width:248px;flex:0 0 248px;background:linear-gradient(180deg,var(--ink) 0%,var(--navy) 100%);padding:18px 14px 24px;color:#fff}
.sidebar .sb-title{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:#9FB4DF;margin:4px 8px 10px;font-weight:600}
.rolebtn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:#E9EFFA;padding:10px 10px;border-radius:11px;margin-bottom:5px;border-left:3px solid transparent;transition:background .15s}
.rolebtn:hover{background:rgba(255,255,255,.08)}
.rolebtn.active{background:rgba(255,255,255,.12);border-left-color:var(--orange)}
.rolebtn .mono{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex:0 0 auto;background:rgba(255,255,255,.14)}
.rolebtn.active .mono{background:var(--orange)}
.rolebtn .rl{font-size:12.5px;font-weight:600;line-height:1.2}
.rolebtn .rs{font-size:10.5px;color:#A9BCE4;font-weight:400}
.sb-note{margin-top:18px;background:rgba(255,255,255,.07);border:1px dashed rgba(255,255,255,.25);border-radius:12px;padding:11px 12px;font-size:11px;color:#C7D5F2;line-height:1.5}
.sb-note b{color:#fff}
.content{flex:1;padding:22px 26px 60px;min-width:0}

/* ── Encabezados de vista y tabs ────────── */
.vhead{margin-bottom:16px}
.vhead h1{font-size:21px;color:var(--ink);font-weight:700;letter-spacing:-.2px}
.vhead p{color:var(--muted);font-size:12.5px;margin-top:3px;max-width:760px}
.tabs{display:flex;gap:8px;margin:16px 0 18px;flex-wrap:wrap}
.tab{background:#fff;border:1px solid var(--line);border-radius:99px;padding:8px 16px;font-size:12.5px;font-weight:600;color:var(--muted)}
.tab:hover{border-color:#C8D6EE;color:var(--navy)}
.tab.active{background:var(--navy);border-color:var(--navy);color:#fff}
.tab .nbadge{background:var(--orange);color:#fff;border-radius:99px;font-size:10px;padding:1px 7px;margin-left:6px}
.tab.active .nbadge{background:#fff;color:var(--navy)}

/* ── Cards, grids ───────────────────────── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:18px}
.card+.card{margin-top:16px}
.card h3{font-size:14.5px;color:var(--ink);margin-bottom:4px}
.card .sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.split{display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:start}

/* ── Botones ────────────────────────────── */
.btn{border:0;border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:filter .15s,transform .05s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{filter:brightness(1.12)}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{filter:brightness(1.07)}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--navy)}
.btn-ghost:hover{border-color:#BCCDEC;background:var(--blue-soft)}
.btn-sm{padding:6px 12px;font-size:11.5px;border-radius:9px}
.btn[disabled]{opacity:.45;cursor:not-allowed}

/* ── Chips y tags de estado ─────────────── */
.chip{display:inline-flex;align-items:center;gap:6px;border-radius:99px;font-size:11px;font-weight:600;padding:4px 11px;white-space:nowrap}
.chip .cdot{width:7px;height:7px;border-radius:50%;background:currentColor}
.c-agendado{background:var(--blue-soft);color:var(--navy2)}
.c-recepcionado{background:var(--purple-soft);color:var(--purple)}
.c-proceso{background:var(--amber-soft);color:var(--amber)}
.c-proceso .cdot{animation:pulse 1.6s infinite}
.c-listo{background:#FDF3DC;color:#9A7B12}
.c-dictamen{background:var(--green-soft);color:var(--green)}
.c-pendiente{background:#EEF2F8;color:#7D8CA6}
.c-atencion{background:var(--amber-soft);color:var(--amber)}
.c-completado{background:var(--green-soft);color:var(--green)}
.c-apto{background:var(--green-soft);color:var(--green)}
.c-aptoobs{background:var(--amber-soft);color:var(--amber)}
.c-noapto{background:var(--red-soft);color:var(--red)}
.atag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.4px;border-radius:6px;padding:2px 7px;color:#fff}
.a-lab{background:var(--navy)} .a-gab{background:var(--gold)} .a-img{background:var(--orange)} .a-con{background:var(--green)}
.canal{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;border-radius:7px;padding:3px 8px;border:1px solid}
.k-portal{color:var(--navy2);border-color:#C9D9F6;background:var(--blue-soft)}
.k-whatsapp{color:#1E9E5A;border-color:#BFE8D1;background:var(--green-soft)}
.k-llamada{color:var(--orange);border-color:#F8CDB3;background:var(--orange-soft)}
.k-correo{color:var(--purple);border-color:#DCD2F5;background:var(--purple-soft)}
</style>
<style>
/* ── Tablas ─────────────────────────────── */
table{width:100%;border-collapse:collapse}
th{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-weight:600}
td{padding:10px;border-bottom:1px solid #EFF3FA;font-size:12.5px;vertical-align:middle}
tr:last-child td{border-bottom:0}
tr.rowhover:hover td{background:#F8FAFE}
.tname{font-weight:600;color:var(--ink)} .tsub{font-size:11px;color:var(--muted)}

/* ── Formularios ────────────────────────── */
.fgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:11px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--navy);letter-spacing:.2px}
.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:#FBFCFE;outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy2);background:#fff}
.sp2{grid-column:span 2}.sp3{grid-column:span 3}.sp6{grid-column:1/-1}
.cat-block{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:10px;background:#FBFCFE}
.cat-title{font-size:11.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;margin-bottom:9px}
.cat-title .dot{width:9px;height:9px;border-radius:3px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px 14px}
.ck{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 9px;cursor:pointer}
.ck:hover{border-color:#C8D6EE}
.ck input{accent-color:var(--orange);width:15px;height:15px;flex:0 0 auto}
.ck:has(input:checked){border-color:var(--orange);background:var(--orange-soft)}

/* ── Agenda / filas de pacientes ────────── */
.agrow{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:10px;background:#fff;flex-wrap:wrap}
.agrow:hover{border-color:#C9D7F0;box-shadow:var(--sh)}
.aghora{font-weight:800;color:var(--navy);font-size:16px;min-width:54px;letter-spacing:-.3px}
.agmain{flex:1;min-width:200px}
.agname{font-weight:700;color:var(--ink);font-size:13.5px}
.agsub{font-size:11.5px;color:var(--muted);margin-top:1px}
.agtags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.agacts{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.newflag{background:var(--orange);color:#fff;font-size:9.5px;font-weight:800;letter-spacing:.6px;border-radius:5px;padding:2px 6px;animation:blink 1.4s infinite}
@keyframes blink{50%{opacity:.55}}

/* ── Progreso, timeline, feed ───────────── */
.pbar{height:7px;border-radius:99px;background:#EAF0F9;overflow:hidden;flex:1}
.pbar>span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--navy2),var(--orange));transition:width .4s}
.ptxt{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
.timeline{list-style:none;margin-top:6px}
.timeline li{position:relative;padding:0 0 13px 20px;font-size:12px;color:var(--text)}
.timeline li::before{content:"";position:absolute;left:5px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--orange)}
.timeline li::after{content:"";position:absolute;left:8.5px;top:14px;bottom:-2px;width:1.5px;background:var(--line)}
.timeline li:last-child::after{display:none}
.timeline .th{font-weight:700;color:var(--navy);margin-right:7px;font-size:11px}
.feed{list-style:none;max-height:430px;overflow:auto}
.feed li{display:flex;gap:9px;padding:9px 2px;border-bottom:1px dashed var(--line);font-size:12px;align-items:flex-start}
.feed li:last-child{border-bottom:0}
.feed .fh{font-size:10.5px;font-weight:700;color:var(--orange);min-width:40px;margin-top:1px}

/* ── KPI / charts ───────────────────────── */
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:15px 17px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy2),var(--orange))}
.kpi .kv{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-.5px}
.kpi .kl{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.kpi .kd{font-size:10.5px;margin-top:6px;font-weight:600}
.kd.up{color:var(--green)}.kd.warn{color:var(--amber)}
.hbar{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.hbar .hl{width:120px;font-size:11.5px;color:var(--text);font-weight:600;text-align:right}
.hbar .ht{flex:1;background:#EFF3FA;border-radius:99px;height:14px;overflow:hidden}
.hbar .ht>span{display:block;height:100%;border-radius:99px}
.hbar .hv{font-size:11px;font-weight:700;color:var(--navy);min-width:24px}
.donutwrap{display:flex;gap:18px;align-items:center}
.donut{width:128px;height:128px;border-radius:50%;position:relative;flex:0 0 auto}
.donut::after{content:attr(data-c);position:absolute;inset:22px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;color:var(--ink)}
.lg{font-size:11.5px;display:flex;flex-direction:column;gap:7px}
.lg span{display:flex;align-items:center;gap:7px;color:var(--text)}
.lg i{width:10px;height:10px;border-radius:3px;display:inline-block}
.funnel .fstep{margin-bottom:8px}
.funnel .fl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px}
.funnel .ft{height:17px;background:#EFF3FA;border-radius:7px;overflow:hidden}
.funnel .ft>span{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--navy),var(--navy2))}

/* ── Modal y toasts ─────────────────────── */
#overlay{position:fixed;inset:0;background:rgba(11,37,87,.45);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:90;padding:34px 16px;overflow:auto}
#overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;box-shadow:0 24px 70px rgba(11,37,87,.3);width:100%;max-width:760px;padding:22px 24px;animation:mod .18s ease}
.modal.wide{max-width:980px}
@keyframes mod{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.mhead{display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--line);padding-bottom:13px;margin-bottom:15px}
.mhead h2{font-size:16px;color:var(--ink)}
.mhead .msub{font-size:12px;color:var(--muted);margin-top:2px}
.mclose{margin-left:auto;background:#F1F4FA;border:0;width:30px;height:30px;border-radius:9px;font-size:15px;color:var(--muted)}
.mclose:hover{background:#E4EAF6;color:var(--navy)}
#toasts{position:fixed;right:18px;bottom:18px;z-index:120;display:flex;flex-direction:column;gap:9px}
.toast{background:var(--ink);color:#fff;border-radius:11px;padding:11px 15px;font-size:12.5px;box-shadow:0 10px 30px rgba(11,37,87,.35);display:flex;gap:9px;align-items:center;animation:tin .2s ease;max-width:360px}
.toast.ok{border-left:4px solid var(--green)} .toast.warn{border-left:4px solid var(--orange)}
@keyframes tin{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

/* ── Vista Inicio ───────────────────────── */
.hero{background:linear-gradient(120deg,var(--ink) 0%,var(--navy) 55%,#1C4FB0 100%);border-radius:18px;color:#fff;padding:30px 32px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-70px;top:-70px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(242,107,43,.45),transparent 65%)}
.hero h1{font-size:24px;font-weight:800;letter-spacing:-.3px}
.hero p{color:#C9D7F4;font-size:13px;margin-top:7px;max-width:640px;line-height:1.6}
.hero .goldline{display:inline-block;margin-top:14px;background:rgba(255,255,255,.12);border:1px solid rgba(235,210,126,.5);color:var(--gold2);border-radius:99px;padding:6px 14px;font-size:11.5px;font-weight:600}
.rolecards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.rcard{background:#fff;border:1px solid var(--line);border-radius:15px;padding:17px;box-shadow:var(--sh);cursor:pointer;transition:transform .12s,border .12s;text-align:left}
.rcard:hover{transform:translateY(-2px);border-color:var(--orange)}
.rcard .mono{width:38px;height:38px;border-radius:11px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-bottom:10px}
.rcard h4{font-size:13.5px;color:var(--ink)} .rcard p{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5}
.steps{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:16px}
.step{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;position:relative}
.step .sn{width:24px;height:24px;border-radius:50%;background:var(--orange);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.step h5{font-size:11.5px;color:var(--ink)} .step p{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.45}

/* ── Certificado / impresión ────────────── */
.cert{border:1px solid var(--line);border-radius:13px;padding:22px 26px}
.cert .chead{display:flex;align-items:center;gap:12px;border-bottom:2.5px solid var(--navy);padding-bottom:13px;margin-bottom:15px}
.cert .ctitle{margin-left:auto;text-align:right}
.cert .ctitle b{display:block;color:var(--navy);font-size:14px;letter-spacing:.6px}
.cert .ctitle span{font-size:11px;color:var(--muted)}
.cdata{display:grid;grid-template-columns:repeat(4,1fr);gap:9px 16px;font-size:12px;margin-bottom:14px}
.cdata div b{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.resultado-box{border-radius:12px;padding:13px 17px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:10px;margin:14px 0}
.r-apto{background:var(--green-soft);color:var(--green);border:1px solid #BFE8D1}
.r-aptoobs{background:var(--amber-soft);color:var(--amber);border:1px solid #F3DCAE}
.r-noapto{background:var(--red-soft);color:var(--red);border:1px solid #F2C2C2}
.firma{margin-top:34px;display:flex;justify-content:flex-end}
.firma .fbox{text-align:center;font-size:11.5px;color:var(--text)}
.firma .fline{border-top:1.5px solid var(--ink);width:230px;margin-bottom:5px}
#loginScreen{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(900px 500px at 18% 12%,rgba(242,107,43,.18),transparent 55%),linear-gradient(145deg,#081B43,#11357C 58%,#1D4AA3)}
.logincard{background:#fff;border-radius:20px;box-shadow:0 30px 80px rgba(4,16,44,.5);padding:30px 32px;width:100%;max-width:840px;display:grid;grid-template-columns:1fr 1.15fr;gap:28px}
.logincard h2{font-size:17px;color:var(--ink);margin-bottom:4px}
.logincard .lsub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.lbrand{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.lerror{font-size:11.5px;color:var(--red);font-weight:600;min-height:16px;margin-top:8px}
.duser{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:11px;padding:8px 11px;cursor:pointer;background:#FBFCFE;transition:.15s;width:100%;text-align:left}
.duser:hover{border-color:#BCCDEC;background:var(--blue-soft);transform:translateY(-1px)}

<style>

@media (max-width:980px){.grid5{grid-template-columns:1fr 1fr}.findrow .fname{width:120px}}

function pad(n){return String(n).padStart(2,'0')}
function isoLocal(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
const HOY_ISO=isoLocal(new Date());
const MANANA_ISO=isoLocal(new Date(Date.now()+86400000));
state.fechaAgenda=HOY_ISO;
function nowHM(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes())}
function parseHM(s){if(!s)return null;const[a,b]=s.split(':');return(+a)*60+(+b)}
function fmtDur(min){if(min==null)return'—';const h=Math.floor(min/60),m=min%60;return h?h+' h '+pad(m)+' min':m+' min'}
function fmtFechaLarga(iso){const[y,m,d]=iso.split('-');const dt=new Date(+y,+m-1,+d);return dt.toLocaleDateString('es-BO',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function fmtFechaCorta(iso){if(iso===HOY_ISO)return'Hoy';if(iso===MANANA_ISO)return'Mañana';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y}
function cat(id){return CATALOGO.find(c=>c.id===id)}
function areaDe(id){return AREAS.find(a=>a.id===id)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function edadDe(fnac){if(!fnac)return null;const[y,m,d]=fnac.split('-').map(Number);const h=new Date();let e=h.getFullYear()-y;if(h.getMonth()+1<m||(h.getMonth()+1===m&&h.getDate()<d))e--;return e}
function addMeses(iso,n){const[y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1+n,d);return isoLocal(dt)}
function addDias(iso,n){const[y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1,d+n);return isoLocal(dt)}
function diasHasta(iso){const[y,m,d]=iso.split('-').map(Number);const a=new Date(y,m-1,d),h=new Date();h.setHours(0,0,0,0);return Math.round((a-h)/86400000)}
function esDomingo(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d).getDay()===0}

function cupoEn(fecha,hora){return state.ordenes.filter(o=>o.fecha===fecha&&o.hora===hora).length}
function capDia(){return slotsDia().length*state.cap.porSlot}
function ocupDia(fecha){return state.ordenes.filter(o=>o.fecha===fecha).length}

const ADJ={};            /* archivos en preparación, por "slot" (modal de carga) */
const VIS={};            /* archivos ya guardados, para el visor */
let LBZOOM=1;
function adjGet(slot){return ADJ[slot]||(ADJ[slot]=[])}
function onPickAdj(input,slot){
  const fs=input.files;if(!fs||!fs.length)return;
  const arr=adjGet(slot);let pend=fs.length;
  for(let i=0;i<fs.length;i++){(function(f){
    const r=new FileReader();
    r.onload=()=>{arr.push({name:f.name,type:f.type||'',url:r.result});if(--pend===0)refreshAdjUI(slot)};
    r.onerror=()=>{if(--pend===0)refreshAdjUI(slot)};
    r.readAsDataURL(f);
  })(fs[i]);}
  input.value='';
}
function delAdj(slot,i){adjGet(slot).splice(i,1);refreshAdjUI(slot)}
function refreshAdjUI(slot){
  const t=document.getElementById('thumbs_'+slot);if(t)t.innerHTML=thumbsHtml(slot,true);
  const n=adjGet(slot).length;
  const dz=document.getElementById('dz_'+slot);if(dz)dz.classList.toggle('has',n>0);
  const note=document.getElementById('dznote_'+slot);if(note)note.textContent=n?n+' archivo(s) cargado(s) · clic para añadir más':'';
}
function thumbsHtml(slot,editable){
  const a=adjGet(slot);if(!a.length)return'';
  return a.map((x,i)=>{
    const del=editable?'<button class="tdel" title="Quitar" onclick="event.stopPropagation();delAdj(\''+slot+'\','+i+')">✕</button>':'';
    if(x.type&&x.type.indexOf('image')===0)
      return '<div class="thumb">'+del+'<img src="'+x.url+'" onclick="verImagenSlot(\''+slot+'\','+i+')" alt="'+esc(x.name)+'"><div class="tcap" title="'+esc(x.name)+'">'+esc(x.name)+'</div></div>';
    return '<div class="thumb pdf" style="cursor:pointer" onclick="verImagenSlot(\''+slot+'\','+i+')">'+del+'<span style="font-size:18px">📄</span><span class="tcap" title="'+esc(x.name)+'">'+esc(x.name)+'</span></div>';
  }).join('');
}
function adjDropzone(slot,titulo,hint){
  const n=adjGet(slot).length;

    '<div class="dz-ico">🩻</div><div class="dz-t">'+titulo+'</div><div class="dz-s">'+(hint||'JPG · PNG · DICOM exportado o PDF · clic para subir')+'</div>'+
    '<div class="dz-s" id="dznote_'+slot+'" style="color:var(--green);font-weight:700">'+(n?n+' archivo(s) cargado(s) · clic para añadir más':'')+'</div>'+
    '<input type="file" id="file_'+slot+'" accept="image/*,application/pdf,.dcm" multiple style="display:none" onchange="onPickAdj(this,\''+slot+'\')"></div>'+
    '<div class="thumbs" id="thumbs_'+slot+'">'+thumbsHtml(slot,true)+'</div>';

function mostrarVisor(a){
  if(a.type&&a.type.indexOf('image')!==0){abrirDoc(a);return}
  const lb=document.getElementById('lightbox'),img=document.getElementById('lbImg');
  LBZOOM=1;img.style.transform='scale(1)';img.src=a.url;
  document.getElementById('lbName').textContent=a.name||'Imagen del estudio';
  lb.classList.add('open');
}
function abrirDoc(a){
  const dv=document.getElementById('docview');if(!dv)return window.open(a.url,'_blank');
  document.getElementById('dvName').textContent=a.name||'Documento';
  const fr=document.getElementById('dvFrame'),tab=document.getElementById('dvTab');
  const set=src=>{fr.src=src;tab.href=src};
  set('about:blank');
  fetch(a.url).then(r=>r.blob()).then(b=>{const u=URL.createObjectURL(b);dv._url=u;set(u)}).catch(()=>set(a.url));
  dv.classList.add('open');
}
function cerrarDoc(){const dv=document.getElementById('docview');if(!dv)return;dv.classList.remove('open');const f=document.getElementById('dvFrame');if(f)f.src='about:blank';if(dv._url){URL.revokeObjectURL(dv._url);dv._url=null}}

function pdfDemo(titulo,linea){
  const cl=s=>String(s||'').replace(/[()\\]/g,' ');
  const objs={};
  objs[1]='<</Type/Catalog/Pages 2 0 R>>';
  objs[2]='<</Type/Pages/Kids[3 0 R]/Count 1>>';
  objs[3]='<</Type/Page/Parent 2 0 R/MediaBox[0 0 595 842]/Resources<</Font<</F1 5 0 R>>>>/Contents 4 0 R>>';
  const cont='BT /F1 20 Tf 60 770 Td ('+cl(titulo||'ProMed')+') Tj ET\nBT /F1 12 Tf 60 742 Td ('+cl(linea||'Documento adjunto de demostracion')+') Tj ET\nBT /F1 10 Tf 60 716 Td (ProMed - Salud Ocupacional) Tj ET';
  objs[4]='<</Length '+cont.length+'>>\nstream\n'+cont+'\nendstream';
  objs[5]='<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>';
  let pdf='%PDF-1.4\n';const off={};
  for(let i=1;i<=5;i++){off[i]=pdf.length;pdf+=i+' 0 obj '+objs[i]+'\nendobj\n';}
  const xp=pdf.length;
  pdf+='xref\n0 6\n0000000000 65535 f \n';
  for(let i=1;i<=5;i++){pdf+=(''+off[i]).padStart(10,'0')+' 00000 n \n';}
  pdf+='trailer <</Size 6/Root 1 0 R>>\nstartxref\n'+xp+'\n%%EOF';
  const b64=(typeof btoa!=='undefined')?btoa(pdf):Buffer.from(pdf,'binary').toString('base64');
  return 'data:application/pdf;base64,'+b64;
}

function refreshHoras(){

  h.innerHTML=horasOpts(f.value,h.value);

function calcEdadForm(){
  const f=document.getElementById('f_fnac'),v=document.getElementById('f_edadview');
  if(!f||!v)return;const e=edadDe(f.value);
  v.value=e!=null&&!isNaN(e)?e+' años':'';
}
function gridEstudios(checked){
  const ck=c=>'<label class="ck"><input type="checkbox" id="cb_'+c.id+'"'+(checked.includes(c.id)?' checked':'')+'><span>'+c.nombre+(c.adj?' <span title="Este estudio carga imagen/PDF" style="opacity:.55">📎</span>':'')+'</span></label>';
  return AREAS.map(a=>{
    const items=CATALOGO.filter(c=>c.area===a.id);
    let inner;
    if(a.id==='lab'){
      inner=GRUPOS_LAB.map(g=>{
        const gi=items.filter(c=>c.grupo===g);if(!gi.length)return'';
        return '<div style="margin:7px 0 3px;font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase">'+g+'</div><div class="cat-grid">'+gi.map(ck).join('')+'</div>';
      }).join('');
    }else inner='<div class="cat-grid">'+items.map(ck).join('')+'</div>';
    return '<div class="cat-block"><div class="cat-title"><span class="dot" style="background:'+a.color+'"></span>'+a.nombre+' <span class="tsub" style="font-weight:500">· '+items.length+' estudios</span></div>'+inner+'</div>';
  }).join('');
}

function addPaciente(modo){
  const g=id=>document.getElementById(id);
  const nombre=g('f_nombre').value.trim(),ciNum=g('f_ci').value.trim(),fnac=g('f_fnac').value;
  const estudios=CATALOGO.filter(c=>g('cb_'+c.id)&&g('cb_'+c.id).checked).map(c=>c.id);
  if(!nombre||!ciNum){toast('Completa al menos <b>nombre</b> y <b>C.I.</b> del colaborador.','warn');return}
  if(!fnac){toast('Registra la <b>fecha de nacimiento</b>: la edad se calcula sola.','warn');return}
  if(!estudios.length){toast('Selecciona al menos un estudio.','warn');return}
  const fecha=g('f_fecha').value||MANANA_ISO,hora=g('f_hora').value;
  if(esDomingo(fecha)){toast('Los domingos no se agenda. Elige otro día.','warn');return}
  if(cupoEn(fecha,hora)+state.solicitud.filter(x=>x.fecha===fecha&&x.hora===hora).length>=state.cap.porSlot){
    toast('La franja <b>'+hora+'</b> de '+fmtFechaCorta(fecha)+' ya está completa ('+state.cap.porSlot+' por franja). Elige otra hora o usa <b>Agendamiento masivo</b>.','warn');return}
  const edad=edadDe(fnac);
  state.solicitud.push({nombre,ci:ciNum+' '+g('f_ciext').value,fnac,edad,sexo:g('f_sexo').value,cargo:g('f_cargo').value.trim()||'—',
    tipo:g('f_tipo').value,hora,estudios,fecha,
    empresa:modo==='ops'?g('f_empresa').value:empAct(),
    canal:modo==='ops'?g('f_canal').value:'Portal Empresa'});
  g('f_nombre').value='';g('f_ci').value='';g('f_cargo').value='';g('f_fnac').value='';g('f_edadview').value='';
  renderView();toast('<b>'+esc(nombre)+'</b> ('+edad+' años) agregado a la solicitud.');
}
function removeSol(i){state.solicitud.splice(i,1);renderView()}
function confirmarSolicitud(modo){
  const n=state.solicitud.length;if(!n)return;
  const emp=state.solicitud[0].empresa,canal=state.solicitud[0].canal;

/* ── Extrae las métricas de salud de UNA orden (estudios completados) ── */
function metricsDeOrden(o){
  const par=cid=>{const e=o.estudios.find(x=>x.cid===cid&&x.estado==='completado'&&x.res&&x.res.params);return e?e.res.params:null};
  const ev=o.estudios.find(x=>x.cid==='ev_medica'&&x.estado==='completado'&&x.res);
  const m={ci:o.paciente.ci,nombre:o.paciente.nombre,sexo:o.paciente.sexo,edad:o.paciente.edad,cargo:o.paciente.cargo,empresa:o.empresa,fecha:o.fecha,dictamen:o.dictamen||null};
  const num=v=>{const n=parseFloat(String(v).replace(',','.'));return isNaN(n)?null:n};
  if(ev&&ev.res.params){m.imc=num(ev.res.params.imc);m.pa=ev.res.params.pa||null;if(ev.res.habitos)m.habitos=ev.res.habitos}
  const gl=par('glicemia');if(gl&&gl.glu!=null)m.glu=num(gl.glu);
  const a1=par('hba1c');if(a1&&a1.a1c!=null)m.a1c=num(a1.a1c);
  const co=par('colesterol');if(co&&co.col!=null)m.col=num(co.col);
  const ld=par('ldl');if(ld&&ld.ldl!=null)m.ldl=num(ld.ldl);
  const hd=par('hdl');if(hd&&hd.hdl!=null)m.hdl=num(hd.hdl);
  const tg=par('trigliceridos');if(tg&&tg.tg!=null)m.tg=num(tg.tg);
  const hg=par('hemograma');if(hg&&hg.hb!=null)m.hb=num(hg.hb);
  const au=par('audiometria');if(au&&(au.od!=null||au.oi!=null))m.aud=[num(au.od)||0,num(au.oi)||0];
  const es=par('espirometria');if(es&&es.rel!=null)m.esp=num(es.rel);
  const of=par('oftalmologia');if(of&&(of.avod||of.avoi))m.vis=[of.avod||'',of.avoi||''];
  const tiene=['imc','glu','a1c','col','ldl','hdl','tg','hb','aud','esp','vis','pa'].some(k=>m[k]!=null);
  return tiene?m:null;
}
/* "20/40" → 40 (denominador: a mayor, peor agudeza) */
function visDen(s){const mt=String(s||'').match(/\/(\d+)/);return mt?+mt[1]:20}

/* ── Agrega la población de una empresa (dedup por C.I., examen más reciente) ── */
function saludAgregada(ordenes){
  const byCi={};
  ordenes.forEach(o=>{const m=metricsDeOrden(o);if(!m)return;const k=m.ci;if(!byCi[k]||m.fecha>byCi[k].fecha)byCi[k]=m});
  const ppl=Object.values(byCi);
  const R={n:ppl.length,ppl,
    imc:{bajo:0,normal:0,sobre:0,obes:0,nd:0},
    glu:{normal:0,pre:0,dm:0,nd:0},
    pa:{opt:0,lim:0,hta:0,nd:0},
    lip:{colAlto:0,colLim:0,ldlAlto:0,hdlBajo:0,tgAlto:0,tgLim:0},
    aud:{n:0,hipo:0},esp:{n:0,obstr:0},vis:{n:0,corr:0},hb:{n:0,anemia:0},
    hab:{fuma:0,sed:0,ant:0,n:0},
    dx:{apto:0,obs:0,noapto:0,nd:0},
    vence60:0,vencido:0,
    follow:[]};
  ppl.forEach(m=>{
    const fl=[];
    if(m.imc!=null){if(m.imc<18.5){R.imc.bajo++;fl.push(['Bajo peso','amber'])}else if(m.imc<25)R.imc.normal++;else if(m.imc<30){R.imc.sobre++;fl.push(['Sobrepeso','amber'])}else{R.imc.obes++;fl.push(['Obesidad','red'])}}else R.imc.nd++;
    if(m.glu!=null){if(m.glu<100)R.glu.normal++;else if(m.glu<126){R.glu.pre++;fl.push(['Prediabetes','amber'])}else{R.glu.dm++;fl.push(['Glicemia diabética','red'])}}else R.glu.nd++;
    if(m.pa){const[sy,di]=String(m.pa).split('/').map(Number);if(sy>=140||di>=90){R.pa.hta++;fl.push(['HTA','red'])}else if(sy>=130||di>=85){R.pa.lim++;fl.push(['PA limítrofe','amber'])}else R.pa.opt++}else R.pa.nd++;
    if(m.col!=null){if(m.col>=240){R.lip.colAlto++;fl.push(['Colesterol alto','red'])}else if(m.col>=200){R.lip.colLim++;fl.push(['Colesterol limítrofe','amber'])}}
    if(m.ldl!=null&&m.ldl>=130){R.lip.ldlAlto++;fl.push(['LDL elevado',m.ldl>=160?'red':'amber'])}
    if(m.hdl!=null&&((m.sexo==='M'&&m.hdl<40)||(m.sexo==='F'&&m.hdl<50))){R.lip.hdlBajo++;fl.push(['HDL bajo','amber'])}
    if(m.tg!=null){if(m.tg>=200){R.lip.tgAlto++;fl.push(['Triglicéridos altos','red'])}else if(m.tg>=150){R.lip.tgLim++;fl.push(['Triglicéridos limítrofes','amber'])}}
    if(m.hb!=null){R.hb.n++;if((m.sexo==='M'&&m.hb<13)||(m.sexo==='F'&&m.hb<12)){R.hb.anemia++;fl.push(['Anemia','amber'])}}
    if(m.aud){R.aud.n++;if(m.aud[0]>25||m.aud[1]>25){R.aud.hipo++;fl.push(['Hipoacusia','red'])}}
    if(m.esp!=null){R.esp.n++;if(m.esp<70){R.esp.obstr++;fl.push(['Obstrucción ventilatoria','red'])}}
    if(m.vis){R.vis.n++;if(visDen(m.vis[0])>40||visDen(m.vis[1])>40){R.vis.corr++;fl.push(['Déficit visual','amber'])}}
    if(m.habitos){R.hab.n++;if(m.habitos.fuma){R.hab.fuma++;fl.push(['Fumador','amber'])}if(m.habitos.sedentario)R.hab.sed++;if(m.habitos.antFam)R.hab.ant++}
    const dr=m.dictamen?m.dictamen.resultado:null;
    if(dr==='Apto')R.dx.apto++;else if(dr==='Apto con observaciones')R.dx.obs++;else if(dr==='No apto')R.dx.noapto++;else R.dx.nd++;
    if(m.dictamen&&m.dictamen.vence){const dh=diasHasta(m.dictamen.vence);if(dh<0)R.vencido++;else if(dh<=60)R.vence60++}
    if(fl.length)R.follow.push({m,fl});
  });
  R.follow.sort((a,b)=>{const sev=x=>x.fl.filter(f=>f[1]==='red').length*10+x.fl.length;return sev(b)-sev(a)});
  return R;
}

/* ── Helpers de gráfica ── */
function pctOf(n,d){return d?Math.round(n/d*100):0}
function stackBar(parts){/* parts:[{v,color,lab,short}] */
  const tot=parts.reduce((s,p)=>s+p.v,0)||1;
  const segs=parts.filter(p=>p.v>0).map(p=>'<span style="flex:'+p.v+' '+p.v+' 0;background:'+p.color+'" title="'+esc(p.lab)+': '+p.v+'">'+(p.v/tot>=0.09?p.v+(p.short?'<small>&nbsp;'+p.short+'</small>':''):'')+'</span>').join('');
  const leg=parts.map(p=>'<span><i style="background:'+p.color+'"></i>'+esc(p.lab)+' · <b>'+p.v+'</b> ('+pctOf(p.v,tot)+'%)</span>').join('');
  return '<div class="stack">'+segs+'</div><div class="stacklg">'+leg+'</div>';
}
function findBar(name,n,d,color){
  const p=pctOf(n,d);
  return '<div class="findrow"><div class="fname">'+esc(name)+'</div><div class="ftrack"><span style="width:'+Math.max(p,2)+'%;background:'+color+'"></span></div><div class="fval">'+n+' · '+p+'%</div></div>';
}
function vbarCol(n,d,color,lab){
  const p=pctOf(n,d);const h=Math.max(p,3);
  return '<div class="vbar"><div class="col" style="height:'+h+'%;--c:'+color+'"><b>'+n+'</b></div><div class="lab">'+lab+'<br><b style="color:var(--ink)">'+p+'%</b></div></div>';
}
function metricCard(val,unit,label,color,foot){
  return '<div class="metric" style="--c:'+color+'"><div class="mh"><div class="mv">'+val+'</div>'+(unit?'<div class="mp">'+unit+'</div>':'')+'</div><div class="ml">'+label+'</div>'+(foot?'<div class="mfoot">'+foot+'</div>':'')+'</div>';
}

/* ── PANEL DE SALUD (vista empresa) ── */
function saludEmpresa(mias){
  const R=saludAgregada(mias);
  if(!R.n)return '<div class="card" style="text-align:center;color:var(--muted)">Aún no hay exámenes con resultados para construir el panel de salud. Agenda colaboradores y, cuando el médico evaluador publique los informes, aquí verás las estadísticas y las acciones sugeridas.</div>';
  const N=R.n;
  const RED='var(--red)',AMB='var(--amber)',GRN='var(--green)',NV='var(--navy2)',NV0='var(--navy)',GRY='#9FB1CC',PUR='var(--purple)',GOLD='var(--gold)';
  const sobreP=R.imc.sobre+R.imc.obes, metabP=R.glu.pre+R.glu.dm, accionables=R.follow.length;
  const vig=R.dx.apto+R.dx.obs;

  /* KPIs */
  const kpis='<div class="grid5" style="margin-bottom:16px">'+
    metricCard(N,'','Colaboradores evaluados',NV,'Exámenes con resultados')+
    metricCard(pctOf(vig,N),'%','Aptos para el trabajo',GRN,vig+' de '+N+' con dictamen apto')+
    metricCard(accionables,'','Con hallazgos para seguimiento',accionables>N*0.4?RED:AMB,pctOf(accionables,N)+'% de la población')+
    metricCard(sobreP,'','Sobrepeso u obesidad',sobreP>N*0.4?RED:AMB,pctOf(sobreP,N)+'% · IMC ≥ 25')+
    metricCard(R.vence60,'','Periódicos por vencer',R.vencido?RED:(R.vence60?AMB:GRN),R.vencido?(R.vencido+' ya vencido(s)'):'En los próximos 60 días')+
    '</div>';

  /* Composición corporal */
  const cIMC='<div class="card"><div class="sec-eyebrow">Composición corporal · índice de masa corporal</div>'+
    '<h3 style="margin-bottom:4px">Distribución de IMC</h3>'+
    '<div class="sub" style="margin-bottom:12px">'+sobreP+' de '+N+' colaboradores ('+pctOf(sobreP,N)+'%) presentan sobrepeso u obesidad — principal hallazgo modificable de la población.</div>'+
    stackBar([{v:R.imc.bajo,color:GOLD,lab:'Bajo peso'},{v:R.imc.normal,color:GRN,lab:'Peso normal'},{v:R.imc.sobre,color:AMB,lab:'Sobrepeso'},{v:R.imc.obes,color:RED,lab:'Obesidad'}])+
    '</div>';

  /* Riesgo metabólico: glucosa + presión */
  const cMet='<div class="card"><div class="sec-eyebrow">Riesgo cardiometabólico</div><div class="grid2" style="gap:22px">'+
    '<div><h3 style="margin-bottom:4px">Glicemia basal</h3><div class="sub" style="margin-bottom:12px">'+(R.glu.dm?R.glu.dm+' en rango diabético · ':'')+R.glu.pre+' con prediabetes.</div>'+
      stackBar([{v:R.glu.normal,color:GRN,lab:'Normal <100'},{v:R.glu.pre,color:AMB,lab:'Prediabetes 100–125'},{v:R.glu.dm,color:RED,lab:'Diabético ≥126'}])+'</div>'+
    '<div><h3 style="margin-bottom:4px">Presión arterial</h3><div class="sub" style="margin-bottom:12px">'+R.pa.hta+' con cifras de hipertensión · '+R.pa.lim+' limítrofes.</div>'+
      stackBar([{v:R.pa.opt,color:GRN,lab:'Óptima <130/85'},{v:R.pa.lim,color:AMB,lab:'Limítrofe'},{v:R.pa.hta,color:RED,lab:'HTA ≥140/90'}])+'</div>'+
    '</div></div>';

  /* Perfil lipídico */
  const cLip='<div class="card"><div class="sec-eyebrow">Perfil lipídico · dislipidemias</div><h3 style="margin-bottom:12px">Alteraciones del colesterol y triglicéridos</h3>'+
    findBar('Colesterol total alto (≥240)',R.lip.colAlto,N,RED)+
    findBar('Colesterol limítrofe (200–239)',R.lip.colLim,N,AMB)+
    findBar('LDL elevado (≥130)',R.lip.ldlAlto,N,RED)+
    findBar('HDL bajo (protector)',R.lip.hdlBajo,N,AMB)+
    findBar('Triglicéridos altos (≥200)',R.lip.tgAlto,N,RED)+
    '<div class="sub" style="margin-top:4px">Porcentaje sobre los '+N+' colaboradores evaluados.</div></div>';

  /* Hallazgos ocupacionales */
  let cOcu='';
  if(R.aud.n||R.esp.n||R.vis.n){
    const cols=[];
    if(R.aud.n)cols.push(vbarCol(R.aud.hipo,R.aud.n,RED,'Hipoacusia<br>('+R.aud.n+' audiom.)'));
    if(R.esp.n)cols.push(vbarCol(R.esp.obstr,R.esp.n,PUR,'Obstrucción<br>('+R.esp.n+' espiro.)'));
    if(R.vis.n)cols.push(vbarCol(R.vis.corr,R.vis.n,NV,'Déficit visual<br>('+R.vis.n+' visiom.)'));
    if(R.hb.n)cols.push(vbarCol(R.hb.anemia,R.hb.n,GOLD,'Anemia<br>('+R.hb.n+' hemog.)'));
    cOcu='<div class="card"><div class="sec-eyebrow">Vigilancia ocupacional</div><h3 style="margin-bottom:4px">Hallazgos asociados al puesto</h3>'+
      '<div class="sub" style="margin-bottom:6px">Proporción de colaboradores con hallazgo sobre el total que se realizó cada estudio.</div>'+
      '<div class="vbars">'+cols.join('')+'</div></div>';
  }

  /* Hábitos */
  let cHab='';
  if(R.hab.n){
    cHab='<div class="card"><div class="sec-eyebrow">Estilo de vida · factores de riesgo</div><h3 style="margin-bottom:12px">Hábitos declarados en la evaluación médica</h3>'+
      findBar('Tabaquismo activo',R.hab.fuma,R.hab.n,RED)+
      findBar('Sedentarismo',R.hab.sed,R.hab.n,AMB)+
      findBar('Antecedente familiar cardiometabólico',R.hab.ant,R.hab.n,PUR)+
      '<div class="sub" style="margin-top:4px">Sobre '+R.hab.n+' colaboradores con antecedentes registrados.</div></div>';
  }

  /* Acciones sugeridas */
  const acc=[];
  const A=(c,ico,cs,prio,t,n,p)=>acc.push({c,ico,cs,prio,t,n,p});
  if(sobreP>0)A(sobreP>N*0.4?RED:AMB,'🍎','var(--orange-soft)',sobreP>N*0.4?'alta':'media','Campaña nutricional y control de peso',sobreP,'Implementar un programa de alimentación saludable y actividad física dirigido. Considerar valoración nutricional individual para los casos de obesidad y menú saludable en comedor/cafetería.');
  if(metabP>0)A(R.glu.dm?RED:AMB,'🩸','var(--red-soft)',R.glu.dm?'alta':'media','Tamizaje y control de glicemia',metabP,(R.glu.dm?'Derivar los '+R.glu.dm+' caso(s) en rango diabético a endocrinología y ':'')+'repetir glicemia/HbA1c en prediabéticos a 3 meses con consejería sobre azúcar y peso.');
  if(R.pa.hta>0)A(R.pa.hta>=3?RED:AMB,'❤️','var(--red-soft)',R.pa.hta>=3?'alta':'media','Manejo de hipertensión arterial',R.pa.hta,'Confirmar cifras con monitoreo (MAPA/automedición), derivar a medicina interna/cardiología y registrar control periódico de presión en sitio.');
  const disli=R.lip.colAlto+R.lip.ldlAlto+R.lip.tgAlto;
  if(disli>0)A(AMB,'🧪','var(--amber-soft)','media','Manejo de dislipidemia',disli,'Reforzar dieta baja en grasas saturadas y evaluación de riesgo cardiovascular; derivar los LDL/colesterol muy altos para tratamiento.');
  if(R.aud.hipo>0)A(RED,'👂','var(--red-soft)','alta','Reforzar protección auditiva (EPP)',R.aud.hipo,'Auditar uso de protección auditiva en puestos con ruido, audiometría de control y mediciones de ruido ambiental. Hallazgo ocupacional prioritario.');
  if(R.esp.obstr>0)A(PUR,'🫁','var(--purple-soft)','alta','Evaluación neumológica',R.esp.obstr,'Derivar a neumología los patrones obstructivos y revisar exposición a polvos/humos y uso de protección respiratoria.');
  if(R.hab.fuma>0)A(AMB,'🚭','var(--amber-soft)',R.hab.fuma>R.hab.n*0.3?'alta':'media','Programa de cesación de tabaco',R.hab.fuma,'Ofrecer consejería antitabaco y apoyo para dejar de fumar; reduce el riesgo cardiovascular y respiratorio de la plantilla.');
  if(R.hab.sed>0)A(AMB,'🏃','var(--orange-soft)','media','Pausas activas y actividad física',R.hab.sed,'Instaurar pausas activas por turno y promover actividad física (convenios, retos internos). Complementa el control de peso y presión.');
  if(R.vence60>0||R.vencido>0)A(R.vencido?RED:AMB,'📅','var(--blue-soft)',R.vencido?'alta':'media','Programar exámenes periódicos',R.vence60+R.vencido,(R.vencido?R.vencido+' examen(es) ya vencido(s) y ':'')+R.vence60+' por vencer en 60 días. Agendar para mantener la vigencia y el cumplimiento normativo.');
  if(R.vis.corr>0)A(AMB,'👓','var(--amber-soft)','baja','Corrección visual',R.vis.corr,'Recomendar valoración oftalmológica y corrección óptica para los puestos que lo requieran (pantallas, conducción, precisión).');
  const ordPrio={alta:0,media:1,baja:2};
  acc.sort((a,b)=>ordPrio[a.prio]-ordPrio[b.prio]||b.n-a.n);
  let cAcc='<div class="card"><div class="sec-eyebrow">Recomendaciones</div><h3 style="margin-bottom:4px">Acciones sugeridas para la empresa</h3>'+
    '<div class="sub" style="margin-bottom:14px">Priorizadas automáticamente a partir de los hallazgos de salud de tu plantilla. El número indica a cuántos colaboradores impacta cada acción.</div>';
  if(!acc.length)cAcc+='<div class="action" style="--c:var(--green);--cs:var(--green-soft)"><div class="aico">✅</div><div><h4>Sin hallazgos prioritarios</h4><p>La población evaluada no muestra alteraciones relevantes. Mantén la vigilancia periódica.</p></div></div>';
  else cAcc+=acc.map(a=>'<div class="action" style="--c:'+a.c+';--cs:'+a.cs+'"><div class="aico">'+a.ico+'</div><div style="flex:1"><h4>'+esc(a.t)+' <span class="prio prio-'+a.prio+'">'+a.prio.toUpperCase()+'</span> <span class="acount">'+a.n+' colaborador'+(a.n===1?'':'es')+'</span></h4><p>'+esc(a.p)+'</p></div></div>').join('');
  cAcc+='</div>';

  /* Seguimiento individual */
  let cFol='';
  if(R.follow.length){
    const rows=R.follow.map(f=>{
      const m=f.m;const chips=f.fl.map(x=>'<span class="fchip f-'+x[1]+'">'+esc(x[0])+'</span>').join('');
      const dx=m.dictamen?chipDx(m.dictamen.resultado):'';
      return '<tr class="rowhover"><td class="tname">'+esc(m.nombre)+'<div class="tsub">'+esc(m.cargo)+' · '+(m.edad||'—')+' a · '+esc(m.ci)+'</div></td>'+
        '<td>'+chips+'</td><td style="white-space:nowrap">'+dx+'</td></tr>';
    }).join('');
    cFol='<div class="card"><div class="sec-eyebrow">Seguimiento individual · '+R.follow.length+' colaborador(es)</div>'+
      '<h3 style="margin-bottom:4px">Colaboradores que requieren seguimiento</h3>'+
      '<div class="sub" style="margin-bottom:10px">Identificados por sus resultados (nombres reservados al área de salud ocupacional). Ordenados por severidad de los hallazgos.</div>'+
      '<table><thead><tr><th>Colaborador</th><th>Hallazgos</th><th>Dictamen</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }

  return kpis+cIMC+cMet+cLip+cOcu+cHab+cAcc+cFol;
}

const DEMOLAB={hemograma:{hb:'14.2',hto:'43',leu:'7.1',plq:'255'},glicemia:{glu:'90'},trigliceridos:{tg:'132'},colesterol:{col:'182'},orina:{asp:'Límpido',ph:'6.0',pro:'Negativo',glu2:'Negativo'},grupo_rh:{gru:'O',rh:'Positivo'}};

function labOrdenesHoy(){return state.ordenes.filter(o=>o.fecha===HOY_ISO&&o.estudios.some(e=>e.area==='lab')).sort((a,b)=>a.hora.localeCompare(b.hora))}

function vLab(){
  const ords=labOrdenesHoy();
  let pend=0,done=0,espera=0,sinrec=0;
  ords.forEach(o=>{const ls=o.estudios.filter(e=>e.area==='lab');
    pend+=ls.filter(e=>e.estado!=='completado').length;
    done+=ls.filter(e=>e.estado==='completado').length;
    if(o.checkin&&ls.some(e=>e.estado!=='completado'))espera++;
    if(!o.checkin)sinrec++;});

function labCola(ords){
  if(!ords.length)return '<div class="card" style="text-align:center;color:var(--muted)">No hay estudios de laboratorio agendados para hoy.</div>';
  return ords.map(o=>{
    const ls=o.estudios.filter(e=>e.area==='lab');
    const todos=ls.every(e=>e.estado==='completado');

    else if(todos)act='<button class="btn btn-ghost btn-sm" onclick="labModal(\''+o.id+'\')">Ver resultados</button>';
    else act='<button class="btn btn-primary btn-sm" onclick="labModal(\''+o.id+'\')">Cargar resultados</button>';

      '<div class="agmain"><div class="agname">'+esc(o.paciente.nombre)+'</div>'+
      '<div class="agsub">'+esc(o.empresa)+' · '+o.tipo+' · '+o.id+(o.checkin?' · Check-in '+o.checkin:'')+'</div>'+
      '<div class="agtags">'+chips+'</div></div>'+chipO(o)+'<div class="agacts">'+act+'</div></div>';
  }).join('');
}

function labResultados(){
  const rows=[];
  state.ordenes.forEach(o=>o.estudios.forEach(e=>{if(e.area==='lab'&&e.estado==='completado')rows.push({o,e})}));
  rows.sort((a,b)=>(b.e.hFin||'').localeCompare(a.e.hFin||''));

  return '<div class="card" style="padding:0;overflow:hidden">'+
    '<table><thead><tr><th>Hora</th><th>Paciente</th><th>Empresa</th><th>Estudio</th><th>Resultado</th><th>Conclusión</th></tr></thead><tbody>'+
    rows.map(({o,e})=>'<tr class="rowhover"><td>'+(e.hFin||'—')+'</td><td class="tname">'+esc(o.paciente.nombre)+'<div class="tsub">'+o.id+'</div></td><td>'+esc(o.empresa)+'</td><td>'+e.nombre+'</td><td class="tsub" style="font-size:11.5px">'+resumenRes(e)+'</td><td>'+(e.res&&e.res.conclusion?e.res.conclusion:'—')+'</td></tr>').join('')+
    '</tbody></table></div>';
}

function validarLab(oid,cid){
  const o=state.ordenes.find(x=>x.id===oid);if(!o)return;
  const e=o.estudios.find(x=>x.cid===cid&&x.area==='lab');if(!e||e.estado==='completado')return;
  const c=cat(cid);const params={};let falta=false;
  (c.params||[]).forEach(p=>{const el=document.getElementById('p_'+oid+'_'+cid+'_'+p.k);const v=el?el.value.trim():'';if(!v)falta=true;params[p.k]=v});
  if(falta){toast('Completa todos los parámetros de <b>'+e.nombre+'</b> antes de validar.','warn');return}
  const obs=(document.getElementById('p_'+oid+'_'+cid+'_obs')||{value:''}).value.trim();
  const con=(document.getElementById('p_'+oid+'_'+cid+'_con')||{value:'Normal'}).value;
  const slot='lab_'+oid+'_'+cid;const adjuntos=adjGet(slot).slice();
  e.res={params,obs,conclusion:con,adjuntos};e.estado='completado';e.hIni=e.hIni||o.checkin||nowHM();e.hFin=nowHM();e.prof=ESPS.lab.prof;
  delete ADJ[slot];
  pushTL(o,'Laboratorio validó '+e.nombre+' ('+con+')');
  pushFeed('<b>Laboratorio</b> publicó <b>'+e.nombre+'</b> de '+esc(o.paciente.nombre)+' · '+con+'.');
  const restantes=o.estudios.filter(x=>x.area==='lab'&&x.estado!=='completado').length;
  if(!restantes){pushTL(o,'Perfil de laboratorio completo');toast('<b>'+esc(o.paciente.nombre)+'</b>: laboratorio completo. Resultados ya visibles en Revisión Médica.')}
  else toast('<b>'+e.nombre+'</b> validado. Quedan '+restantes+' estudio(s) de este paciente.');
  if(estadoO(o).key==='listo'){pushTL(o,'Expediente completo · pasa a Revisión Médica');pushFeed('Expediente de <b>'+esc(o.paciente.nombre)+'</b> completo → cola de <b>Revisión Médica</b>.')}
  renderView();labModal(oid);
}

function iniciarEst(oid,cid){

function guardarInforme(oid,cid){
  const o=state.ordenes.find(x=>x.id===oid);if(!o)return;
  const e=o.estudios.find(x=>x.cid===cid);if(!e)return;
  const c=cat(cid);const esImg=c.area==='img';const params={};
  (c.params||[]).forEach(p=>{const el=document.getElementById('m_'+oid+'_'+cid+'_'+p.k);if(el&&el.value.trim())params[p.k]=el.value.trim()});
  const inf=(document.getElementById('m_'+oid+'_'+cid+'_inf')||{value:''}).value.trim();
  const con=(document.getElementById('m_'+oid+'_'+cid+'_con')||{value:'Normal'}).value;
  if(!inf){toast(esImg?'Escribe al menos un hallazgo antes de finalizar.':'Escribe el informe antes de finalizar.','warn');return}
  const slot='med_'+oid+'_'+cid;const adjuntos=adjGet(slot).slice();
  if(c.adj&&!adjuntos.length){toast('Sugerencia: '+(esImg?'sube la <b>placa o imagen</b>; se incrustará en el informe radiológico.':'adjunta el <b>trazado</b> del estudio en imagen/PDF.'),'warn')}
  e.res={};if(Object.keys(params).length)e.res.params=params;e.res.informe=inf;e.res.conclusion=con;e.res.adjuntos=adjuntos;
  if(esImg){
    const concl=(document.getElementById('m_'+oid+'_'+cid+'_concl')||{value:''}).value.trim();
    const macId=(document.getElementById('m_'+oid+'_'+cid+'_mac')||{value:''}).value;
    e.res.lineas=inf.split('\n').map(s=>s.trim()).filter(Boolean);
    e.res.informeConcl=concl;
    if(macId)e.res.machote=macId;
  }
  if(cid==='ev_medica'){const gh=k=>{const el=document.getElementById('m_'+oid+'_ev_medica_'+k);return !!(el&&el.checked)};e.res.habitos={fuma:gh('fuma'),sedentario:gh('sed'),antFam:gh('ant')}}
  delete ADJ[slot];
  e.estado='completado';e.hFin=nowHM();if(!e.hIni)e.hIni=e.hFin;if(!e.prof)e.prof=ESPS[e.esp]?ESPS[e.esp].prof:'';
  const dur=fmtDur(Math.max(0,(parseHM(e.hFin)||0)-(parseHM(e.hIni)||0)));
  pushTL(o,'Finalizó '+e.nombre+' ('+con+') · duración '+dur);
  pushFeed('<b>'+esc(e.prof)+'</b> publicó informe de <b>'+e.nombre+'</b> · '+esc(o.paciente.nombre)+' · '+con+'.');
  closeModal();

  renderView();
}

function hashStr(s){let h=2166136261;s=String(s);for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return (h>>>0)}
/* Firma de demostración (trazo a mano, determinista por nombre) */
function firmaDemo(nombre){
  const h=hashStr(nombre),r=n=>((h>>(n*2))&7);
  let d='M12 52',x=12;
  for(let i=0;i<6;i++){const cx1=x+9+r(i),cy1=22+r(i+1)*4,cx2=x+22+r(i+2),cy2=72-r(i+3)*5,ex=x+34+r(i)*2,ey=50-(r(i+4)-3)*3;d+=' C'+cx1+' '+cy1+' '+cx2+' '+cy2+' '+ex+' '+ey;x=ex;}
  d+=' l 16 -5';
  const svg='<svg xmlns="http://www.w3.org/2000/svg" width="240" height="80" viewBox="0 0 240 80">'+
    '<path d="'+d+'" fill="none" stroke="#16264a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>'+
    '<path d="M16 64 q 90 9 168 -3" fill="none" stroke="#16264a" stroke-width="1.3" opacity=".65"/></svg>';
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
}
/* Retrato de demostración (silueta tipo foto carnet, determinista) */
function avatarDemo(seed,sexo){
  const h=hashStr('a'+seed),hue=h%360;
  const bg='hsl('+hue+',32%,86%)',bg2='hsl('+hue+',30%,70%)';

  const hair=['#2b2b2b','#43301f','#6b4a2f','#1c1c1c','#574234'][h%5];
  const torso=sexo==='F'?'#3b5a8c':'#33415c';
  const fem=sexo==='F';
  const svg='<svg xmlns="http://www.w3.org/2000/svg" width="220" height="262" viewBox="0 0 220 262">'+
    '<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+bg+'"/><stop offset="1" stop-color="'+bg2+'"/></linearGradient></defs>'+
    '<rect width="220" height="262" fill="url(#bg)"/>'+
    '<ellipse cx="110" cy="250" rx="80" ry="62" fill="'+torso+'"/>'+
    '<rect x="96" y="150" width="28" height="34" rx="10" fill="'+skin+'"/>'+
    '<circle cx="110" cy="112" r="52" fill="'+skin+'"/>'+
    (fem?'<path d="M56 118 q-2-62 54-62 q56 0 54 62 q-6-30-22-36 q4 30-6 52 q-4-30-10-40 q-18 16-40 14 q-20-2-24-2 q-6 6-6 12z" fill="'+hair+'"/>'
        :'<path d="M58 104 q4-48 52-48 q48 0 52 48 q-12-22-52-22 q-40 0-52 22z" fill="'+hair+'"/>')+
    '<circle cx="92" cy="110" r="4.2" fill="#3a2c22"/><circle cx="128" cy="110" r="4.2" fill="#3a2c22"/>'+
    '<path d="M104 126 q6 5 12 0" fill="none" stroke="#b98a6a" stroke-width="2" stroke-linecap="round"/>'+
    '<path d="M99 134 q11 8 22 0" fill="none" stroke="#9c6b4f" stroke-width="2.4" stroke-linecap="round"/></svg>';
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);

/* Carpetas físicas (Operaciones): lista + impresión por lote */
function opsCarpetas(){

    '<td>'+esc(o.empresa)+'</td><td>'+o.tipo+'</td><td>'+fmtFechaCorta(o.fecha)+'</td>'+
    '<td>'+chipDx(o.dictamen.resultado)+'</td>'+

    '<td><button class="btn btn-ghost btn-sm" onclick="verExpediente(\''+o.id+'\')">Ver / imprimir</button></td></tr>').join('');
  return '<div class="card"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px"><h3 style="margin:0">Carpetas físicas para imprimir y enviar</h3>'+

    '<div class="sub" style="margin-bottom:10px">Marca los expedientes y genera un solo documento listo para imprimir (cada paciente empieza en página nueva). Ideal para preparar varias carpetas a la vez.</div>'+
    '<table><thead><tr><th></th><th>Paciente</th><th>Empresa</th><th>Tipo</th><th>Fecha</th><th>Dictamen</th><th>Foto</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function carpSelTodas(v){state.ordenes.filter(o=>o.dictamen).forEach(o=>{const c=document.getElementById('carp_'+o.id);if(c)c.checked=v})}
function imprimirCarpetas(){
  const sel=state.ordenes.filter(o=>o.dictamen&&(document.getElementById('carp_'+o.id)||{}).checked);
  if(!sel.length){toast('Marca al menos un expediente para imprimir.','warn');return}
  const doc='<div class="exp-doc">'+sel.map(o=>expedienteHTML(o).replace(/^<div class="exp-doc">/,'').replace(/<\/div>$/,'')).join('')+'</div>';
  openModal('<div class="mhead"><div><h2>Carpetas para impresión · '+sel.length+' expediente(s)</h2><div class="msub">Un solo documento; cada paciente comienza en una página nueva</div></div>'+
    '<button class="mclose" onclick="closeModal()">✕</button></div>'+doc+

}

/* ════════════════════════════════════════
   VISTA · GERENCIA (DASHBOARD)
════════════════════════════════════════ */
function vAdmin(){
  const hoy=state.ordenes.filter(o=>o.fecha===HOY_ISO);
  const enAt=hoy.filter(o=>estadoO(o).key==='proceso').length;
  const listos=state.ordenes.filter(o=>estadoO(o).key==='listo').length;
  const dict=state.ordenes.filter(o=>o.dictamen);
  const durs=dict.filter(o=>o.dictamen.durMin!=null).map(o=>o.dictamen.durMin);
  const prom=durs.length?Math.round(durs.reduce((a,b)=>a+b,0)/durs.length):null;
  const aptosPct=dict.length?Math.round(dict.filter(o=>o.dictamen.resultado!=='No apto').length/dict.length*100):null;

  const kpis='<div class="grid4" style="margin-bottom:16px">'+
    '<div class="kpi"><div class="kv">'+hoy.length+'</div><div class="kl">Pacientes agendados hoy</div><div class="kd" style="color:var(--navy2)">'+hoy.filter(o=>o.checkin).length+' ya recepcionados</div></div>'+
    '<div class="kpi"><div class="kv">'+enAt+'</div><div class="kl">En atención ahora</div><div class="kd" style="color:var(--orange)">'+listos+' listos para revisión médica</div></div>'+
    '<div class="kpi"><div class="kv">'+dict.length+'</div><div class="kl">Dictámenes emitidos</div><div class="kd" style="color:var(--green)">'+(aptosPct!=null?aptosPct+'% aptos':'—')+'</div></div>'+
    '<div class="kpi"><div class="kv">'+(prom!=null?fmtDur(prom):'—')+'</div><div class="kl">Ciclo promedio check-in → dictamen</div><div class="kd" style="color:var(--muted)">Antes: 24 – 72 h en papel</div></div></div>';

  /* Pacientes por empresa */
  const porEmp={};state.ordenes.forEach(o=>{porEmp[o.empresa]=(porEmp[o.empresa]||0)+1});
  const empArr=Object.entries(porEmp).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxE=empArr.length?empArr[0][1]:1;
  const cols=['#11357C','#1D4AA3','#F26B2B','#1E9E5A','#C9A227','#6D4FC4'];
  const hbars=empArr.map((x,i)=>'<div class="hbar"><div class="hl">'+esc(x[0])+'</div><div class="ht"><span style="width:'+Math.round(x[1]/maxE*100)+'%;background:'+cols[i%cols.length]+'"></span></div><div class="hv">'+x[1]+'</div></div>').join('');

  /* Canales */
  const porCan={};state.ordenes.forEach(o=>{porCan[o.canal]=(porCan[o.canal]||0)+1});
  const tot=state.ordenes.length;
  let acc=0;const segs=[];const leg=[];
  CANALES.forEach(c=>{const n=porCan[c.id]||0;if(!n)return;const a0=acc/tot*360,a1=(acc+n)/tot*360;acc+=n;
    segs.push(c.color+' '+a0.toFixed(1)+'deg '+a1.toFixed(1)+'deg');
    leg.push('<div style="display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:6px"><span style="width:10px;height:10px;border-radius:3px;background:'+c.color+'"></span>'+c.id+' <b style="margin-left:auto">'+n+'</b><span class="tsub">('+Math.round(n/tot*100)+'%)</span></div>');});
  const donut='<div class="donutwrap"><div class="donut" data-c="'+tot+'" style="background:conic-gradient('+segs.join(',')+')"></div><div style="flex:1">'+leg.join('')+'</div></div>';

  /* Funnel etapas */
  const cnt={agendado:0,recepcionado:0,proceso:0,listo:0,dictamen:0};
  state.ordenes.forEach(o=>{cnt[estadoO(o).key]++});
  const ftot=state.ordenes.length||1;
  const funnel=[['agendado','Agendados'],['recepcionado','Recepcionados'],['proceso','En atención'],['listo','Listos p/ revisión'],['dictamen','Con dictamen']]
    .map(x=>'<div class="fstep"><div class="fl"><span>'+x[1]+'</span><span>'+cnt[x[0]]+'</span></div><div class="ft"><span style="width:'+Math.max(4,Math.round(cnt[x[0]]/ftot*100))+'%"></span></div></div>').join('');

  return '<div class="vhead"><h1>Gerencia · Tablero en tiempo real</h1><p>Lo que antes vivía en hojas sueltas, ahora es métrica: volumen por empresa, canal de agendamiento, etapa de cada paciente y tiempos reales del ciclo de atención.</p></div>'+
    kpis+
    '<div class="grid3" style="margin-bottom:16px;align-items:stretch">'+
    '<div class="card"><h3>Pacientes por empresa</h3><div class="sub">Órdenes acumuladas en el sistema</div>'+(hbars||'<div class="tsub">Sin datos</div>')+'</div>'+
    '<div class="card"><h3>Canal de agendamiento</h3><div class="sub">El portal reduce llamadas y WhatsApp</div>'+donut+'</div>'+
    '<div class="card"><h3>Embudo de etapas</h3><div class="sub">Estado actual de todas las órdenes</div><div class="funnel">'+funnel+'</div></div></div>'+
    opsTodas()+
    saludGerencia()+
    '<div class="card" style="margin-top:16px"><h3>Actividad en tiempo real</h3><div class="sub">Bitácora de todo el centro</div><ul class="feed">'+
    state.feed.slice(0,12).map(x=>'<li><span class="fh">'+x.h+'</span><span>'+x.txt+'</span></li>').join('')+'</ul></div>';
}
function saludGerencia(){
  const R=saludAgregada(state.ordenes);
  if(!R.n)return '';
  const N=R.n,RED='var(--red)',AMB='var(--amber)',GRN='var(--green)',NV='var(--navy2)',GOLD='var(--gold)';
  const sobre=R.imc.sobre+R.imc.obes,metab=R.glu.pre+R.glu.dm;
  return '<div class="card" style="margin-top:16px"><div class="sec-eyebrow">Salud poblacional · todas las empresas</div>'+
    '<h3 style="margin-bottom:4px">Estado de salud agregado de la plantilla atendida</h3>'+
    '<div class="sub" style="margin-bottom:13px">'+N+' colaboradores con resultados, de todas las empresas cliente — insumo para ofrecer programas de salud ocupacional y vigilancia dirigida.</div>'+
    '<div class="grid4" style="margin-bottom:14px">'+
      metricCard(N,'','Colaboradores evaluados',NV,'')+
      metricCard(pctOf(sobre,N),'%','Sobrepeso u obesidad',sobre>N*0.4?RED:AMB,sobre+' colaboradores · IMC ≥ 25')+
      metricCard(pctOf(metab,N),'%','Glicemia alterada',R.glu.dm?RED:AMB,metab+' con pre/diabetes')+
      metricCard(R.pa.hta,'','Con hipertensión',R.pa.hta?RED:GRN,'cifras ≥ 140/90 mmHg')+
    '</div>'+
    '<div class="grid2" style="gap:22px"><div><div class="tsub" style="font-weight:700;color:var(--navy);margin-bottom:8px">Distribución de IMC</div>'+
      stackBar([{v:R.imc.bajo,color:GOLD,lab:'Bajo peso'},{v:R.imc.normal,color:GRN,lab:'Normal'},{v:R.imc.sobre,color:AMB,lab:'Sobrepeso'},{v:R.imc.obes,color:RED,lab:'Obesidad'}])+'</div>'+
      '<div><div class="tsub" style="font-weight:700;color:var(--navy);margin-bottom:8px">Glicemia basal</div>'+
      stackBar([{v:R.glu.normal,color:GRN,lab:'Normal'},{v:R.glu.pre,color:AMB,lab:'Prediabetes'},{v:R.glu.dm,color:RED,lab:'Diabético'}])+'</div></div></div>';
}

function buildLogin(){state.loginMode=state.loginMode||'landing';renderLoginScreen();}
function doLogin(u,p){
  const x=USUARIOS.find(z=>z.u===u&&z.p===p);
  if(!x){const e=document.getElementById('lg_err');if(e)e.textContent='Usuario o contraseña incorrectos.';return false}
  state.user=x;
  if(x.esp)state.esp=x.esp;
  state.role=ACCESOS[x.rol][0]==='inicio'?'inicio':ACCESOS[x.rol][0];
  state.tab=DEFAULT_TAB[state.role]||null;
  document.getElementById('loginScreen').style.display='none';
  renderAll();
  toast('Bienvenido(a), <b>'+esc(x.nombre)+'</b> · '+ROLA[x.rol]+'. El sistema te llevó directo a tu panel.');
  return true;
}
function doLoginForm(){doLogin((document.getElementById('lg_u')||{value:''}).value.trim(),(document.getElementById('lg_p')||{value:''}).value)}
function quickLogin(u){const x=USUARIOS.find(z=>z.u===u);if(x)doLogin(x.u,x.p)}
function logout(){
  state.user=null;state.solicitud=[];state.masivo=null;
  state.loginMode='landing';renderLoginScreen();
  document.getElementById('loginScreen').style.display='flex';

}

function parseLote(txt){

  });

function distribuirPacs(pacs,modo){

  let fecha=f0;

  const asig=[];let i=0,guard=0;
  while(i<pacs.length&&guard<200){
    if(esDomingo(fecha)){fecha=addDias(fecha,1);guard++;continue}

/* ── Carga por Excel / CSV ── */
function normKey(s){return String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}
function normFecha(v){
  if(v==null||v==='')return '';
  if(v instanceof Date&&!isNaN(v))return isoLocal(v);
  if(typeof v==='number'){
    if(window.XLSX&&XLSX.SSF&&XLSX.SSF.parse_date_code){const d=XLSX.SSF.parse_date_code(v);if(d&&d.y)return d.y+'-'+pad(d.m)+'-'+pad(d.d)}
    const dt=new Date(Math.round((v-25569)*86400*1000));if(!isNaN(dt))return isoLocal(dt);
  }
  let s=String(v).trim();
  let m=s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);if(m)return m[1]+'-'+pad(+m[2])+'-'+pad(+m[3]);
  m=s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/);if(m)return m[3]+'-'+pad(+m[2])+'-'+pad(+m[1]);
  return s;
}
function filasAPacientes(rows){
  if(!rows||!rows.length)return{pacs:[],err:0};
  const first=rows[0]||[];
  const hasHeader=first.some(c=>/nombre/.test(normKey(c)));
  let idx={nombre:0,ci:1,exped:2,fnac:3,sexo:4,cargo:5},start=0;
  if(hasHeader){
    idx={};
    first.forEach((c,i)=>{const k=normKey(c);
      if(/nombre/.test(k)){if(idx.nombre==null)idx.nombre=i}
      else if(/exped/.test(k)){idx.exped=i}
      else if(/nac/.test(k)){idx.fnac=i}
      else if(/sexo|genero/.test(k)){idx.sexo=i}
      else if(/cargo|puesto/.test(k)){idx.cargo=i}
      else if(/(ci|cedula|carnet|document)/.test(k)){if(idx.ci==null)idx.ci=i}
    });
    start=1;
  }
  const pacs=[];let err=0;
  for(let r=start;r<rows.length;r++){
    const row=rows[r]||[];const get=k=>idx[k]!=null?row[idx[k]]:undefined;
    const nombre=String(get('nombre')??'').trim();if(!nombre)continue;
    let ci=String(get('ci')??'').replace(/[^0-9A-Za-z ]/g,'').trim();
    const exped=String(get('exped')??'').trim().toUpperCase();
    const fnac=normFecha(get('fnac'));
    const sexo=(String(get('sexo')??'M').trim().toUpperCase().charAt(0)==='F')?'F':'M';
    const cargo=String(get('cargo')??'—').trim()||'—';
    const ed=edadDe(fnac);
    if(!fnac||ed==null||isNaN(ed)){err++;continue}
    if(!/[A-Za-z]{2}$/.test(ci))ci=ci+' '+(/^[A-Z]{2}$/.test(exped)?exped:'SC');
    pacs.push({nombre,ci,fnac,edad:ed,sexo,cargo});
  }
  return {pacs,err};
}
function splitCSVline(line,delim){
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];
    if(q){if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++}else q=false}else cur+=ch}
    else{if(ch==='"')q=true;else if(ch===delim){out.push(cur);cur=''}else cur+=ch}}
  out.push(cur);return out.map(s=>s.trim());
}
function parseCSVrows(text){
  text=String(text||'').replace(/\r/g,'');
  const lines=text.split('\n').filter(l=>l.trim()!=='');
  if(!lines.length)return[];
  const s=lines[0];
  const delim=(s.split(';').length>s.split(',').length)?';':((s.split('\t').length>s.split(',').length)?'\t':',');
  return lines.map(l=>splitCSVline(l,delim));
}
function cargarExcelMasivo(input,modo){
  const f=input.files&&input.files[0];if(!f)return;
  const ext=(f.name.split('.').pop()||'').toLowerCase();
  const fin=rows=>{
    input.value='';
    const{pacs,err}=filasAPacientes(rows);
    if(err)toast(err+' fila(s) con datos incompletos fueron omitidas.','warn');
    if(!pacs.length){toast('No se leyeron colaboradores. Revisa las columnas <b>Nombre · CI · Fecha de nacimiento · Sexo · Cargo</b>.','warn');return}
    toast('Archivo leído: <b>'+pacs.length+'</b> colaborador(es) válido(s). Distribuyendo…');
    distribuirPacs(pacs,modo);
  };
  if(ext==='csv'||!window.XLSX){
    const r=new FileReader();r.onload=()=>fin(parseCSVrows(r.result));r.onerror=()=>toast('No se pudo leer el archivo.','warn');r.readAsText(f,'utf-8');return;
  }
  const r=new FileReader();
  r.onload=()=>{try{
    const wb=XLSX.read(new Uint8Array(r.result),{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    fin(XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,raw:true,defval:''}));
  }catch(err){toast('No se pudo leer el Excel. Prueba guardándolo como <b>CSV</b> y súbelo de nuevo.','warn')}};
  r.onerror=()=>toast('No se pudo leer el archivo.','warn');
  r.readAsArrayBuffer(f);
}

function vencimientosEmpresa(mias){
  const rows=mias.filter(o=>o.dictamen&&o.dictamen.vence).map(o=>({o,d:diasHasta(o.dictamen.vence)})).sort((a,b)=>a.d-b.d);
  if(!rows.length)return '<div class="card" style="text-align:center;color:var(--muted)">Cuando tus colaboradores tengan dictamen, aquí verás cuándo vence cada certificado para programar el examen periódico a tiempo.</div>';

  return '<div class="card" style="margin-bottom:14px;display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px"><span>🔴 <b>'+venc+'</b> vencido(s)</span><span>🟠 <b>'+prox+'</b> vence(n) en ≤ 60 días</span><span class="tsub">Vigilancia de la salud: el examen periódico controla la adaptación del trabajador a su ocupación (D.L. 16998).</span></div>'+
    '<div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>Colaborador</th><th>Cargo</th><th>Último examen</th><th>Dictamen</th><th>Vence</th><th>Estado</th><th></th></tr></thead><tbody>'+
    rows.map(({o,d})=>{

      return '<tr class="rowhover"><td class="tname">'+esc(o.paciente.nombre)+'<div class="tsub">C.I. '+esc(o.paciente.ci)+'</div></td><td>'+esc(o.paciente.cargo)+'</td><td>'+fmtFechaCorta(o.fecha)+'</td><td>'+chipDx(o.dictamen.resultado)+'</td><td><b>'+fmtFechaCorta(o.dictamen.vence)+'</b></td><td>'+st+'</td>'+
      '<td><button class="btn btn-ghost btn-sm" onclick="preAgendar(\''+o.id+'\')">Reagendar examen</button></td></tr>';
    }).join('')+'</tbody></table></div>';

function preAgendar(oid){
  const o=state.ordenes.find(x=>x.id===oid);if(!o)return;
  const ci=(o.paciente.ci||'').split(' ');
  state.pref={nombre:o.paciente.nombre,ciNum:ci[0]||'',ciExt:ci[1]||'SC',fnac:o.paciente.fnac||'',sexo:o.paciente.sexo,cargo:o.paciente.cargo,tipo:'Periódico (intraocupacional)'};
  state.tab='agendar';renderView();
  toast('Formulario precargado con los datos de <b>'+esc(o.paciente.nombre)+'</b>. Elige fecha, hora y perfil.');
}

function slugId(txt){
  const m={'á':'a','é':'e','í':'i','ó':'o','ú':'u','ñ':'n','ü':'u'};
  let id=String(txt).toLowerCase().replace(/[áéíóúñü]/g,c=>m[c]).replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,28)||'estudio';
  let base=id,k=2;while(cat(id))id=base+'_'+(k++);
  return id;
}
function guardarEstudio(){
  const g=id=>document.getElementById(id);
  const nombre=(g('ne_nombre')||{value:''}).value.trim();
  if(!nombre){toast('Ponle nombre al estudio.','warn');return}
  const area=(g('ne_area')||{value:'lab'}).value;
  const params=[];
  for(let i=0;i<NP_COUNT;i++){
    const n=(g('nep_n_'+i)||{value:''}).value.trim();if(!n)continue;
    params.push({k:'p'+i,n,u:(g('nep_u_'+i)||{value:''}).value.trim(),ref:(g('nep_r_'+i)||{value:''}).value.trim()||'—'});
  }
  const c={id:slugId(nombre),nombre,area,esp:(g('ne_esp')||{value:'lab'}).value};
  const grupo=(g('ne_grupo')||{value:''}).value;if(area==='lab')c.grupo=grupo||'Química sanguínea';
  if((g('ne_adj')||{value:''}).value)c.adj=1;
  if(params.length)c.params=params;
  CATALOGO.push(c);
  closeModal();toast('Estudio <b>'+esc(nombre)+'</b> creado ('+(ESPS[c.esp]?ESPS[c.esp].label:c.esp)+'). Ya se puede agendar.');renderView();
}
