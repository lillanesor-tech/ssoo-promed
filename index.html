  const m=macId?MACHOTES.find(x=>x.id===macId):null;
  const imgStudies=CATALOGO.filter(c=>c.area==='img');
  const empOpts='<option value="*"'+((m&&m.empresa==='*')||!m?' selected':'')+'>Todas (estándar)</option>'+EMPRESAS.map(e=>'<option value="'+esc(e)+'"'+(m&&m.empresa===e?' selected':'')+'>'+esc(e)+'</option>').join('');
  const estOpts=imgStudies.map(c=>'<option value="'+c.id+'"'+(m&&m.cid===c.id?' selected':'')+'>'+esc(c.nombre)+'</option>').join('');
  openModal('<div class="mhead"><div><h2>'+(m?'Editar machote':'Crear machote de informe')+'</h2><div class="msub">Plantilla de hallazgos y conclusión para un estudio de imagen, opcionalmente por empresa</div></div><button class="mclose" onclick="closeModal()">✕</button></div>'+
    '<input type="hidden" id="mc_id" value="'+(m?m.id:'')+'">'+
    '<div class="grid2" style="gap:11px"><div class="field"><label>Estudio (imagen)</label><select id="mc_cid">'+estOpts+'</select></div>'+
    '<div class="field"><label>Empresa</label><select id="mc_emp">'+empOpts+'</select></div></div>'+
    '<div class="field" style="margin-top:11px"><label>Nombre del machote</label><input id="mc_nombre" value="'+(m?esc(m.nombre):'')+'" placeholder="Ej.: Rx Tórax PA — formato Tetra Pak"></div>'+
    '<div class="field" style="margin-top:11px"><label>Hallazgos · un hallazgo por línea</label><textarea id="mc_lineas" rows="8">'+(m?esc(m.lineas.join('\n')):'')+'</textarea></div>'+
    '<div class="field" style="margin-top:11px"><label>Conclusión por defecto</label><input id="mc_concl" value="'+(m?esc(m.conclusion):'')+'"></div>'+
    '<div style="margin-top:14px;text-align:right"><button class="btn btn-primary" onclick="guardarMachote()">'+(m?'Guardar cambios':'Crear machote')+'</button></div>');
}
function guardarMachote(){
  const g=id=>document.getElementById(id);
  const id=(g('mc_id')||{value:''}).value;
  const cid=(g('mc_cid')||{value:''}).value;
  const empresa=(g('mc_emp')||{value:'*'}).value;
  const nombre=(g('mc_nombre')||{value:''}).value.trim();
  const lineas=(g('mc_lineas')||{value:''}).value.split('\n').map(s=>s.trim()).filter(Boolean);
  const conclusion=(g('mc_concl')||{value:''}).value.trim();
  if(!nombre){toast('Ponle un nombre al machote.','warn');return}
  if(!lineas.length){toast('Agrega al menos un hallazgo.','warn');return}
  if(id){const m=MACHOTES.find(x=>x.id===id);if(m){m.cid=cid;m.empresa=empresa;m.nombre=nombre;m.lineas=lineas;m.conclusion=conclusion}}
  else MACHOTES.push({id:nuevoMachoteId(),cid,empresa,nombre,lineas,conclusion});
  closeModal();toast('Machote <b>'+esc(nombre)+'</b> guardado'+(empresa!=='*'?' para <b>'+esc(empresa)+'</b>':'')+'.');renderView();
}

/* ════════════════════════════════════════
   PORTAL DEL PACIENTE · ACCESO AUTORIZADO Y AUTO-SEGUIMIENTO (DOBLE CHECK)
════════════════════════════════════════ */
function accesoDe(o){return o.acceso||(o.acceso={habilitado:false,nivel:'parcial',areas:[],token:null})}
function genToken(){const s='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let t='';for(let i=0;i<8;i++)t+=s[Math.floor(Math.random()*s.length)];return t}
function portalURL(o){const a=accesoDe(o);return 'portal.promed.com.bo/p/'+(a.token||'········')}
function areasDeOrden(o){return AREAS.filter(a=>o.estudios.some(e=>e.area===a.id))}
function togglePortal(oid,on){const o=state.ordenes.find(x=>x.id===oid);if(!o)return;const a=accesoDe(o);a.habilitado=on;if(on){if(!a.token)a.token=genToken();if(a.nivel==='parcial'&&!a.areas.length)a.areas=areasDeOrden(o).map(x=>x.id)}refreshAcceso(oid);toast(on?'Acceso del paciente <b>habilitado</b>. Comparte el enlace.':'Acceso del paciente deshabilitado.')}
function setPortalNivel(oid,n){const o=state.ordenes.find(x=>x.id===oid);if(!o)return;const a=accesoDe(o);a.nivel=n;if(n==='parcial'&&!a.areas.length)a.areas=areasDeOrden(o).map(x=>x.id);refreshAcceso(oid)}
function togglePortalArea(oid,area){const o=state.ordenes.find(x=>x.id===oid);if(!o)return;const a=accesoDe(o);const i=a.areas.indexOf(area);if(i<0)a.areas.push(area);else a.areas.splice(i,1);refreshAcceso(oid)}
function copiarPortal(oid){const o=state.ordenes.find(x=>x.id===oid);if(!o)return;const txt='https://'+portalURL(o);
  try{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}catch(e){}
  try{if(navigator&&navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(txt)}catch(e){}
  toast('Enlace copiado: <b>'+esc(txt)+'</b>')}
function accesoPanel(o){
  const a=accesoDe(o);
  const areasOrden=areasDeOrden(o);
  const areaChecks=areasOrden.map(ar=>'<label class="ck" style="margin-right:14px"><input type="checkbox" '+(a.areas.indexOf(ar.id)>=0?'checked':'')+' onchange="togglePortalArea(\''+o.id+'\',\''+ar.id+'\')"><span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+ar.color+';margin-right:5px"></span>'+ar.nombre+'</span></label>').join('');
  return '<div id="acc_'+o.id+'" class="cat-block" style="margin-top:14px;border-color:#D5E2F8;background:var(--blue-soft)">'+
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div style="font-weight:700;color:var(--navy);font-size:12.5px">👤 Acceso del paciente (portal en línea)</div>'+
    '<label class="ck" style="margin-left:auto"><input type="checkbox" '+(a.habilitado?'checked':'')+' onchange="togglePortal(\''+o.id+'\',this.checked)"><span>Habilitar consulta del paciente</span></label></div>'+
    '<div class="tsub" style="margin-top:6px">El paciente puede ver el <b>avance de sus estudios</b> (siempre) y, si lo autorizas, sus <b>resultados</b>. Define cuánto comparte.</div>'+
    (a.habilitado?(
      '<div style="margin-top:10px;display:flex;gap:18px;flex-wrap:wrap">'+
      '<label class="ck"><input type="radio" name="niv_'+o.id+'" '+(a.nivel==='parcial'?'checked':'')+' onchange="setPortalNivel(\''+o.id+'\',\'parcial\')"><span>Parcial · solo las áreas que elijas</span></label>'+
      '<label class="ck"><input type="radio" name="niv_'+o.id+'" '+(a.nivel==='total'?'checked':'')+' onchange="setPortalNivel(\''+o.id+'\',\'total\')"><span>Total · todos los estudios + dictamen/certificado</span></label></div>'+
      (a.nivel==='parcial'?'<div style="margin-top:9px;padding:9px 11px;background:#fff;border:1px solid var(--line);border-radius:10px"><div class="tsub" style="margin-bottom:6px">Áreas visibles para el paciente:</div>'+(areaChecks||'<span class="tsub">Sin estudios en esta orden.</span>')+'</div>':'<div class="tsub" style="margin-top:8px">El paciente verá todos los resultados y el certificado de aptitud en cuanto esté emitido.</div>')+
      '<div style="margin-top:11px;display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap"><div class="field" style="flex:1;min-width:240px;margin:0"><label>Enlace para el paciente</label><input value="https://'+portalURL(o)+'" readonly style="background:#fff;font-size:11.5px"></div>'+
      '<button class="btn btn-ghost btn-sm" onclick="copiarPortal(\''+o.id+'\')">Copiar</button>'+
      '<button class="btn btn-orange btn-sm" onclick="abrirPortalPaciente(\''+o.id+'\')">Abrir portal</button></div>'
    ):'<div style="margin-top:10px"><button class="btn btn-orange btn-sm" onclick="abrirPortalPaciente(\''+o.id+'\')">Vista previa del portal (solo avance)</button></div>')+
    '</div>';
}
function refreshAcceso(oid){
  const o=state.ordenes.find(x=>x.id===oid);if(!o)return;
  const box=document.getElementById('acc_'+oid);
  if(box)box.outerHTML=accesoPanel(o);
}
function accesoModal(oid){
  const o=state.ordenes.find(x=>x.id===oid);if(!o)return;
  openModal('<div class="mhead"><div><h2>Acceso del paciente al portal</h2><div class="msub">'+esc(o.paciente.nombre)+' · '+esc(o.empresa)+' · '+o.id+'</div></div><button class="mclose" onclick="closeModal()">✕</button></div>'+
    '<div class="msub" style="margin:-2px 0 2px">Decide si el paciente puede consultar sus estudios en línea y cuánto puede ver. El enlace es personal de esta orden.</div>'+
    accesoPanel(o));
}
function abrirPortalPaciente(oid,fromLogin){
  const o=state.ordenes.find(x=>x.id===oid);if(!o)return;
  state.portalOID=oid;state.portalFromLogin=!!fromLogin;
  closeModal();
  const ls=document.getElementById('loginScreen');if(fromLogin&&ls)ls.style.display='none';
  const r=document.getElementById('portalRoot');if(r)r.innerHTML=renderPortal(oid);
  const ps=document.getElementById('portalScreen');if(ps)ps.style.display='flex';
  window.scrollTo({top:0});
}
function cerrarPortal(){
  const ps=document.getElementById('portalScreen');if(ps)ps.style.display='none';
  if(state.portalFromLogin){const ls=document.getElementById('loginScreen');if(ls)ls.style.display='flex'}
  state.portalOID=null;state.portalFromLogin=false;
}
function togglePcheck(oid,cid,on){const o=state.ordenes.find(x=>x.id===oid);if(!o)return;o.pcheck=o.pcheck||{};o.pcheck[cid]=on?{done:true,h:nowHM()}:{done:false};const r=document.getElementById('portalRoot');if(r)r.innerHTML=renderPortal(oid)}
function renderPortal(oid){
  const o=state.ordenes.find(x=>x.id===oid);if(!o)return '<div class="pp-wrap"><div class="pp-card">No se encontró la orden.</div></div>';
  const a=accesoDe(o);o.pcheck=o.pcheck||{};
  const total=o.estudios.length;
  const doneSys=o.estudios.filter(e=>e.estado==='completado').length;
  const doneChk=o.estudios.filter(e=>o.pcheck[e.cid]&&o.pcheck[e.cid].done).length;
  const pend=o.estudios.filter(e=>e.estado!=='completado').length;
  const finalizado=pend===0;
  const seg=areasDeOrden(o).map(ar=>{
    const items=o.estudios.filter(e=>e.area===ar.id);
    return '<div class="pp-area"><div class="pp-area-t"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+ar.color+'"></span>'+ar.nombre+'</div>'+
      items.map(e=>{
        const sysDone=e.estado==='completado';
        const pc=o.pcheck[e.cid]&&o.pcheck[e.cid].done;
        if(sysDone)return '<div class="pp-row done"><span style="width:21px;height:21px;flex:0 0 auto;border-radius:6px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800">✓</span><b>'+e.nombre+'</b><span class="pp-meta"><span style="color:var(--green);font-weight:700">Realizado</span></span></div>';
        return '<div class="pp-row'+(pc?' done':'')+'"><input type="checkbox" class="pp-chk" '+(pc?'checked':'')+' onchange="togglePcheck(\''+o.id+'\',\''+e.cid+'\',this.checked)" title="Marca cuando te lo hayan realizado">'+
          '<b>'+e.nombre+'</b><span class="pp-meta">'+chipE(e)+(pc&&o.pcheck[e.cid].h?'<span style="color:var(--green);font-weight:700">✓ lo marqué '+o.pcheck[e.cid].h+'</span>':'')+'</span></div>';
      }).join('')+'</div>';
  }).join('');
  let resultados;
  if(!a.habilitado){
    resultados='<div class="pp-lock">🔒 Tus <b>resultados</b> aún no están habilitados para consulta en línea. El centro los habilitará cuando estén listos y revisados.</div>';
  }else{
    const areasVis=a.nivel==='total'?areasDeOrden(o).map(x=>x.id):a.areas;
    const bloques=areasDeOrden(o).filter(ar=>areasVis.indexOf(ar.id)>=0).map(ar=>{
      const items=o.estudios.filter(e=>e.area===ar.id);
      return '<div class="pp-area"><div class="pp-area-t"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+ar.color+'"></span>'+ar.nombre+'</div>'+
        items.map(e=>{const listo=e.estado==='completado'&&e.res;let btn;
          if(!listo)btn='<span class="pp-meta">'+chipE(e)+'</span>';
          else if(e.area==='img')btn='<span class="pp-meta"><button class="btn btn-orange btn-sm" onclick="verInformeRx(\''+o.id+'\',\''+e.cid+'\')">Ver informe</button></span>';
          else btn='<span class="pp-meta"><button class="btn btn-ghost btn-sm" onclick="verInforme(\''+o.id+'\',\''+e.cid+'\')">Ver resultado</button></span>';
          return '<div class="pp-row"><b>'+e.nombre+'</b>'+btn+'</div>';
        }).join('')+'</div>';
    }).join('');
    const dictBloque=a.nivel==='total'?(o.dictamen?
      '<div style="margin-top:14px;padding:13px 15px;border:1px solid #BFE6CF;background:var(--green-soft);border-radius:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap"><div><b style="color:var(--ink)">Dictamen de aptitud: '+esc(o.dictamen.resultado)+'</b><div class="tsub">'+(o.dictamen.vence?'Válido hasta '+fmtFechaCorta(o.dictamen.vence):'')+'</div></div><button class="btn btn-green btn-sm" style="margin-left:auto" onclick="verCert(\''+o.id+'\')">Ver certificado</button></div>'
      :'<div class="pp-lock" style="margin-top:14px">Tu <b>dictamen final</b> está en revisión médica. Estará disponible aquí cuando se emita.</div>'):'';
    resultados=(bloques||'<div class="pp-lock">Aún no hay resultados disponibles en las áreas habilitadas.</div>')+dictBloque+
      (a.nivel==='parcial'?'<div class="pp-leyenda">Tu empresa autorizó la consulta <b>parcial</b> de tus estudios. El dictamen final no está incluido en esta vista.</div>':'');
  }
  return '<div class="pp-wrap">'+
    '<div class="pp-top">'+goldCrossSVG(36)+'<div><div class="wordmark" style="font-size:22px"><span class="pro">Pro</span><span class="med">Med</span></div><div class="tagline">Su Salud en las Mejores Manos</div></div>'+
    '<div class="pp-title"><b>Portal del paciente</b><span>'+o.id+' · '+fmtFechaCorta(o.fecha)+'</span></div></div>'+
    '<div class="pp-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap"><div><h3>Hola, '+esc(o.paciente.nombre.split(' ')[0])+' 👋</h3><div class="pp-sub">Aquí ves el avance y los resultados de tu atención en ProMed.</div></div><div>'+chipO(o)+'</div></div>'+
    '<div class="pp-id"><div><b>Nombre</b>'+esc(o.paciente.nombre)+'</div><div><b>Documento</b>'+esc(o.paciente.ci||'—')+'</div><div><b>Empresa</b>'+esc(o.empresa)+'</div><div><b>Tipo de examen</b>'+o.tipo+'</div><div><b>Fecha</b>'+fmtFechaCorta(o.fecha)+(o.checkin?' · '+o.checkin:'')+'</div></div></div>'+
    '<div class="pp-card">'+(finalizado?
      '<h3>Mis estudios</h3><div class="pp-sub">Ya te realizaste todos tus estudios en ProMed. Aquí queda el detalle de tu atención.</div>'+
      '<div style="margin:4px 0 8px;padding:11px 13px;border:1px solid #BFE6CF;background:var(--green-soft);border-radius:11px;font-size:12.5px;color:var(--ink);font-weight:600">✓ Atención completada · te realizaste los '+total+' estudios.</div>'+
      '<div class="pp-prog"><span style="width:100%"></span></div>'
      :
      '<h3>Mis estudios · control de avance</h3><div class="pp-sub">Marca cada estudio que te vayan realizando, para llevar tu propio control de lo que te falta. Tu ✓ más el estado del centro = doble verificación.</div>'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:2px;flex-wrap:wrap;gap:6px"><span>Según el centro: <b style="color:var(--green)">'+doneSys+' de '+total+'</b></span><span>Te faltan: <b style="color:var(--orange2)">'+pend+'</b> · tu confirmación: <b style="color:var(--navy)">'+doneChk+'</b></span></div>'+
      '<div class="pp-prog"><span style="width:'+(total?Math.round(doneSys/total*100):0)+'%"></span></div>'
    )+seg+'</div>'+
    '<div class="pp-card"><h3>Mis resultados</h3><div class="pp-sub">'+(a.habilitado?(a.nivel==='total'?'Tienes acceso completo a tus resultados y certificado.':'Tienes acceso a los resultados de las áreas autorizadas.'):'Acceso a resultados pendiente de habilitación por el centro.')+'</div>'+resultados+'</div>'+
    '<div style="text-align:center;padding:6px 0 0"><button class="btn btn-ghost btn-sm" style="background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)" onclick="cerrarPortal()">Salir del portal</button></div>'+
    '</div>';
}
function portalLookup(){
  const ls=document.getElementById('loginScreen');
  const fromLogin=!!(ls&&ls.style.display!=='none');
  state.portalFromLogin=fromLogin;state.portalOID=null;
  closeModal();
  const hoy=state.ordenes.filter(o=>o.fecha===HOY_ISO);
  const list=(hoy.length?hoy:state.ordenes.slice(-8)).slice(0,12);
  const fl=fromLogin?'true':'false';
  const filas=list.length?list.map(o=>'<button class="duser" onclick="abrirPortalPaciente(\''+o.id+'\','+fl+')"><span class="dmono" style="background:var(--navy)">'+esc((o.paciente.nombre.match(/\b\w/g)||[]).slice(0,2).join('').toUpperCase())+'</span><span><b>'+esc(o.paciente.nombre)+'</b><span>'+esc(o.empresa)+' · '+o.tipo+' · '+fmtFechaCorta(o.fecha)+'</span></span></button>').join(''):'<div class="tsub">Aún no hay pacientes registrados para mostrar.</div>';
  const html='<div class="pp-wrap">'+
    '<div class="pp-top">'+goldCrossSVG(36)+'<div><div class="wordmark" style="font-size:22px"><span class="pro">Pro</span><span class="med">Med</span></div><div class="tagline">Su Salud en las Mejores Manos</div></div>'+
    '<div class="pp-title"><b>Portal del paciente</b><span>Consulta de estudios</span></div></div>'+
    '<div class="pp-card"><h3>Consulta de paciente</h3><div class="pp-sub">Identifícate con tu número de carnet para ver el avance y los resultados de tus estudios.</div>'+
    '<div class="field" style="margin-bottom:0"><label>Número de carnet (CI)</label><input id="pl_ci" placeholder="Ej.: 1234567 SC" onkeydown="if(event.key===\'Enter\')portalBuscarCI()"></div>'+
    '<div style="margin-top:11px"><button class="btn btn-primary btn-sm" onclick="portalBuscarCI()">Ver mis estudios</button></div>'+
    '<div class="sec-eyebrow" style="margin-top:18px">O elige tu nombre (demostración)</div>'+
    '<div style="display:grid;gap:7px;max-height:300px;overflow:auto;margin-top:8px">'+filas+'</div></div>'+
    '<div style="text-align:center;padding:4px 0 0"><button class="btn btn-ghost btn-sm" style="background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)" onclick="cerrarPortal()">'+(fromLogin?'Volver al inicio de sesión':'Cerrar')+'</button></div>'+
    '</div>';
  if(fromLogin&&ls)ls.style.display='none';
  const r=document.getElementById('portalRoot');if(r)r.innerHTML=html;
  const ps=document.getElementById('portalScreen');if(ps)ps.style.display='flex';
  window.scrollTo({top:0});
}
function portalBuscarCI(){
  const ci=(document.getElementById('pl_ci')||{value:''}).value.trim().toLowerCase().replace(/\s+/g,'');
  if(!ci){toast('Escribe tu número de carnet.','warn');return}
  const o=state.ordenes.find(x=>(x.paciente.ci||'').toLowerCase().replace(/\s+/g,'')===ci)||state.ordenes.find(x=>(x.paciente.ci||'').toLowerCase().replace(/\s+/g,'').indexOf(ci)>=0);
  if(!o){toast('No encontramos estudios con ese carnet. Verifica con recepción.','warn');return}
  abrirPortalPaciente(o.id,state.portalFromLogin);
}
